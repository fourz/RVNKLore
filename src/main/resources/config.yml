general:
  # Valid log levels: OFF, SEVERE, WARNING, INFO, DEBUG, FINE
  # DEBUG and FINE are equivalent and both enable debug logging
  # Default: WARNING (quiet mode - set INFO for verbose operational logs)
  logLevel: WARNING

lore:
  nearbyRadius: 50.0
  requireApproval: true
  handlers:
    GENERIC: DEFAULT
    PLAYER: DEFAULT
    CITY: DEFAULT
    LANDMARK: DEFAULT
    FACTION: DEFAULT
    PATH: DEFAULT
    ITEM: DEFAULT
    EVENT: DEFAULT
    QUEST: DEFAULT
    ENCHANTMENT: DEFAULT
    HEAD: DEFAULT
    PLAYER_HEAD: DEFAULT
    MOB_HEAD: DEFAULT
    HAT: DEFAULT

storage:
  test-mode: no # yes = wipe schema on start, no = keep tables on start
  type: mysql
  mysql:
    host: 64.20.41.122
    port: 3306
    username: fourzorg_rvnkuser
    password: ''
    useSSL: true
    database: fourzorg_rvnkcore_dev
    # Table prefix for shared database environments (e.g., 'rvnklore_')
    tablePrefix:
    # HikariCP connection pool settings for MySQL
    poolSize: 10
    connectionTimeout: 30000
    idleTimeout: 600000
    maxLifetime: 1800000
  sqlite:
    database: data.db
    # Table prefix (optional, typically not needed for SQLite)
    tablePrefix:
    # HikariCP connection pool settings for SQLite
    poolSize: 10
    connectionTimeout: 30000
    idleTimeout: 600000
    maxLifetime: 1800000
    optimizations:
      # Enable WAL mode for better concurrent write performance
      useWAL: true
      # Use NORMAL synchronous mode (faster, still safe)
      normalSync: true
  # Fallback configuration for when primary database fails
  fallback:
    # Enable automatic fallback to SQLite when MySQL connection fails
    # When enabled, plugin continues operating using local SQLite storage
    enabled: true
    # Number of consecutive failures before entering fallback mode
    maxFailuresBeforeFallback: 3
    # Minutes to wait before attempting to reconnect to primary database
    recoveryTimeMinutes: 5

dynmap:
  enabled: true
  marker-set:
    id: rvnklore
    label: "Lore Entries"
    hide-by-default: false
    layer-priority: 10
  icons:
    LANDMARK: pin
    MONUMENT: temple
    CITY: bighouse
    TAVERN: house
    SHRINE: church
    PATH: walk
    EVENT: skull
    FACTION: castle
    default: sign
  only-approved: true
  # Per-type layer configuration for Dynmap sidebar
  # Each location-capable type gets its own toggleable layer
  layers:
    CITY:
      label: "Cities"
      hidden: false
      priority: 10
    LANDMARK:
      label: "Landmarks"
      hidden: false
      priority: 11
    MONUMENT:
      label: "Monuments"
      hidden: false
      priority: 12
    TAVERN:
      label: "Taverns & Inns"
      hidden: true
      priority: 13
    GUILD:
      label: "Guilds"
      hidden: true
      priority: 14
    SHRINE:
      label: "Shrines"
      hidden: true
      priority: 15
    PATH:
      label: "Paths & Roads"
      hidden: true
      priority: 16
    EVENT:
      label: "Events"
      hidden: true
      priority: 17
    FACTION:
      label: "Factions"
      hidden: true
      priority: 18
  popup:
    enabled: true
    max-description-length: 200
  # Collection item markers configuration
  collection-markers:
    enabled: true
    # Icon mapping by collection theme
    icons:
      treasure: chest
      mob_heads: skull
      artifacts: diamond
      seasonal: default
      legendary: star
      quest_rewards: book
      default: pin

discord:
  # Discord webhook integration for collection events
  enabled: false
  webhooks:
    # URL for collection completion webhook
    # Leave blank to disable specific webhook types
    collection-complete: ''
    # Example: 'https://discord.com/api/webhooks/YOUR_WEBHOOK_ID/YOUR_WEBHOOK_TOKEN'

citizens:
  # Citizens NPC collection vendor configuration
  vendors:
    enabled: true
    # Default name prefix for vendor NPCs
    default-name: "Collection Vendor"
    # GUI title for vendor shop menu
    shop-title: "Collection Shop"
    # Price calculation settings
    pricing:
      # Multiplier applied to base item value (e.g., 1.5 = 150% of item value)
      multiplier: 1.5
      # Minimum price in currency units
      min-price: 100
      # Maximum price in currency units
      max-price: 10000
    # Track purchases separately from discoveries
    track-purchases: true
    # Default stackable setting for new vendors
    default-stackable: true

landmarks:
  signs:
    auto_approve: false

cities:
  signs:
    auto_approve: false

taverns:
  signs:
    auto_approve: false

messages:
  generic:
    error:
    - '[Error]'
    success:
    - '[Success]'
    info:
    - '[Info]'
    help:
    - '[Help]'
    no_held_item:
    - 'You must be holding an item!'
