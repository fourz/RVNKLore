name: RVNKLore
api: "1.17"
version: '${project.version}'
description: A lore data system for Minecraft
authors: [Derek, Fourz]
main: org.fourz.RVNKLore.RVNKLore
api-version: 1.17
depend:
  - RVNKCore
softdepend:
  - WorldEdit
  - PlaceholderAPI
  - Dynmap
  - VotingPlugin
  - GriefPrevention

commands:
  lore:
    description: Main command for RVNKLore plugin
    usage: /lore <subcommand> [args...]

permissions:
  rvnklore.*:
    description: Gives access to all RVNKLore commands
  rvnklore.admin:
    description: Gives access to administrative commands
    default: op
    children: {}
  rvnklore.command.*:
    description: Gives access to all basic lore commands
  rvnklore.register.*:
    description: Gives access to all registration commands
  rvnklore.command.add:
    description: Allows adding new lore entries
  rvnklore.command.get:
    description: Allows viewing lore entries
  rvnklore.command.list:
    description: Allows listing lore entries
  rvnklore.command.getitem:
    description: Allows getting lore items
    default: op
  rvnklore.register.city:
    description: Allows registering new cities
  rvnklore.register.faction:
    description: Allows registering new factions with territory claims
  rvnklore.faction.*:
    description: Gives access to all faction management commands
    children:
      rvnklore.faction.manage: true
  rvnklore.faction.manage:
    description: Allows managing faction territories and members
  rvnklore.sign.landmark:
    description: Allows players to create landmark signs
    default: op
  rvnklore.sign.city:
    description: Allows players to create city signs
    default: op
  rvnklore.sign.tavern:
    description: Allows players to create tavern signs
    default: op
  rvnklore.approve.own:
    description: Allows players to auto-approve their own submissions
    default: op
  rvnklore.admin.item.give:
    description: Allows giving any lore item via /lore item give
    default: op
  rvnklore.command.collection:
    description: Allows viewing and claiming collection progress and rewards
  rvnklore.admin.dynmap:
    description: Allows using dynmap integration commands (diff, import)
    default: op
  rvnklore.use:
    description: General access to basic lore commands
    default: true
  rvnklore.book:
    description: Access to lore book commands
    default: true
  rvnklore.book.list:
    description: Allows listing available lore books
    default: true
  rvnklore.book.give:
    description: Allows giving lore books to players
    default: op
